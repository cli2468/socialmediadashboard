services:
  - type: web
    name: trend-analyzer
    runtime: python
    rootDir: backend/trend-analyzer
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: MAX_FILE_SIZE_MB
        value: "100"
      - key: CORS_ORIGINS
        value: "*"
